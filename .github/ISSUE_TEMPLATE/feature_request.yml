name: Feature Request
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 功能建议

       请填写以下详细信息。

  - type: checkboxes
    id: issue-type
    attributes:
      label: 问题类型
      description: 这是什么问题？
      options:
        - label: Bug（功能未按预期工作）
        - label: 功能建议（想要新功能）
          required: true
        - label: 问题咨询（需要帮助）

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 描述这个功能建议要解决的问题或动机
      placeholder: |
        描述你发现的问题，或提出这个功能的原因...
        - 这个功能解决什么问题？
        - 为什么需要这个功能？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 描述你想要的解决方案
      placeholder: |
        描述你期望的解决方案...
        - 这个功能应该做什么？
        - 它应该如何工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你考虑过其他替代方案吗？
      placeholder: |
        描述你考虑过的任何替代方案或解决方法...

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息
      description: 关于功能建议的其他上下文或截图？
      placeholder: |
        在此添加关于功能建议的其他上下文、原型图或示例。
